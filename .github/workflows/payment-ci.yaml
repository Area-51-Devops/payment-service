name: Payment Service CI

on:
  push:
    paths:
      - 'services/payment-service/**'
      - 'services/shared/**'
  pull_request:
    paths:
      - 'services/payment-service/**'
      - 'services/shared/**'
  workflow_dispatch:

jobs:

  # ── Stage 1a: SonarQube Scan + Quality Gate ──────────────────────────────
  ci-sonar:
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-sonar.yml@newsep
    permissions:
      contents: write
    with:
      working_directory: "services/payment-service"
      sonar_project_key: "payment-service"
      service-name: "payment-service"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Stage 1b: Dependency Build + Snyk Scan ───────────────────────────────
  ci-snyk:
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-snyk.yml@newsep
    permissions:
      contents: write
    with:
      working_directory: "services/payment-service"
      service-name: "payment-service"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Stage 2: Build Image · Trivy Scan · Prod Gate · Push · Notify ────────
  # Starts only once both ci-sonar and ci-snyk have passed.
  # On main: prod-gate inside the template will pause for manual approval
  #          after Trivy scan before pushing the image.
  # On PRs:  prod-gate is skipped, no push occurs (push=false from prepare).
  ci-image:
    needs: [ci-sonar, ci-snyk]
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-image.yml@newsep
    permissions:
      contents: write
    with:
      working_directory: "services/payment-service"
      image_name: "area51devops/payment-service"
      run_build: false
      docker_context: "services"
      dockerfile_path: "payment-service/Dockerfile"
      service-name: "payment-service"
      gate_environment: "Gate"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}